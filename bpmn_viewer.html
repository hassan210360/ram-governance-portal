
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BPMN Process Viewer</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/bpmn-js/dist/bpmn-viewer.development.js"></script>
</head>
<body>

<header><h2>BPMN Interactive Process Viewer</h2></header>

<div id="canvas" style="height:700px;border:1px solid #ccc"></div>

<script>
var viewer=new BpmnJS({container:'#canvas'});
fetch('bpmn/governance.bpmn')
.then(r=>r.text())
.then(xml=>viewer.importXML(xml));
</script>

</body>
</html>
