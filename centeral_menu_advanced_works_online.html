<!-- Menu -->
    <script> 
        document.addEventListener("DOMContentLoaded", function(){
        fetch("../components/menu.html")
        .then(response => response.text())
        .then(data => {
        document.getElementById("menu").innerHTML = data;
        });
        });
    </script>
